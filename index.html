<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON GM Dialogue Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6 pb-32">

<div class="max-w-6xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4">JSON Key-Value Editor (GameMaker)</h1>

    <div class="flex flex-wrap items-center gap-4 mb-4">
        <label class="flex items-center gap-2">
            <input type="checkbox" id="gmCheckbox">
            Used with GameMaker
        </label>

        <button id="saveBtn" class="px-4 py-2 bg-green-600 text-white rounded">
            Save JSON
        </button>

        <button id="loadBtn" class="px-4 py-2 bg-yellow-500 text-white rounded">
            Load JSON
        </button>

        <button id="sortBtn" class="px-4 py-2 bg-purple-600 text-white rounded">
            Auto Sort
        </button>

        <input type="file" id="fileInput" class="hidden" accept=".json">

        <div>
            <label class="text-sm">File Name</label>
            <input type="text" id="fileNameInput" class="border rounded px-2 py-1" placeholder="data">
        </div>
    </div>

    <div id="pairs" class="space-y-3"></div>

    <h2 class="mt-6 font-semibold">JSON Preview (exact saved file)</h2>
    <pre id="preview" class="bg-gray-100 p-4 rounded text-sm mt-2"></pre>
</div>

<button id="addBtn"
    class="fixed bottom-6 right-6 px-6 py-3 bg-blue-600 text-white rounded-full shadow-lg z-50">
    + Add Pair
</button>

<script>
document.addEventListener('DOMContentLoaded', () => {

const addBtn = document.getElementById('addBtn');
const pairsContainer = document.getElementById('pairs');
const preview = document.getElementById('preview');
const saveBtn = document.getElementById('saveBtn');
const loadBtn = document.getElementById('loadBtn');
const sortBtn = document.getElementById('sortBtn');
const fileInput = document.getElementById('fileInput');
const fileNameInput = document.getElementById('fileNameInput');

let pairs = [];
let loadedFileName = '';

/* ---------- ADD PAIR ---------- */
addBtn.onclick = () => addPair();

function addPair(initial = {}) {
    const pair = {
        id: crypto.randomUUID(),
        key: initial.key || '',
        value: initial.value || ''
    };
    pairs.push(pair);

    const el = document.createElement('div');
    el.className = 'border p-4 rounded bg-gray-50 pair';
    el.dataset.id = pair.id;

    el.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div>
                <label class="text-sm">Key</label>
                <input class="key w-full border rounded px-2 py-1" value="${pair.key}">
            </div>
            <div>
                <label class="text-sm">Value</label>
                <textarea class="value w-full border rounded px-2 py-1" rows="2">${pair.value}</textarea>
            </div>
        </div>
        <button class="mt-3 text-red-600 delete">Delete</button>
    `;

    pairsContainer.appendChild(el);

    el.querySelector('.key').oninput = e => {
        pair.key = e.target.value;
        updatePreview();
    };

    el.querySelector('.value').oninput = e => {
        pair.value = e.target.value;
        updatePreview();
    };

    el.querySelector('.delete').onclick = () => {
        pairs = pairs.filter(p => p.id !== pair.id);
        el.remove();
        updatePreview();
    };

    updatePreview();
}

/* ---------- PREVIEW (TRUE JSON) ---------- */
function updatePreview() {
    const obj = {};
    pairs.forEach(p => {
        if (p.key) obj[p.key] = p.value;
    });
    preview.textContent = JSON.stringify(obj, null, 4);
}

/* ---------- SAVE ---------- */
saveBtn.onclick = () => {
    const obj = {};
    pairs.forEach(p => {
        if (p.key) obj[p.key] = p.value;
    });

    let name = fileNameInput.value || loadedFileName || 'data';
    if (!name.endsWith('.json')) name += '.json';

    const blob = new Blob(
        [JSON.stringify(obj, null, 4)],
        { type: 'application/json' }
    );

    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
};

/* ---------- LOAD ---------- */
loadBtn.onclick = () => fileInput.click();

fileInput.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;

    loadedFileName = file.name.replace(/\.json$/i, '');
    fileNameInput.value = loadedFileName;

    const reader = new FileReader();
    reader.onload = () => {
        pairsContainer.innerHTML = '';
        pairs = [];

        const json = JSON.parse(reader.result);
        Object.entries(json).forEach(([key, value]) => {
            addPair({ key, value: String(value) });
        });
    };
    reader.readAsText(file);
};

/* ---------- SORT ---------- */
sortBtn.onclick = () => {
    pairs.sort((a, b) => a.key.localeCompare(b.key, undefined, { numeric: true }));
    pairs.forEach(p => {
        const el = pairsContainer.querySelector(`[data-id="${p.id}"]`);
        pairsContainer.appendChild(el);
    });
    updatePreview();
};

/* ---------- INIT ---------- */
addPair();

});
</script>
</body>
</html>
